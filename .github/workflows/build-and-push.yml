name: Build & Push Docker Images

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  push:
    tags: ['v*.*.*']

jobs:
  docker:
    if: >-
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — app
        id: meta-app
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,prefix=

      - name: Docker metadata — pusher
        id: meta-pusher
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-pusher
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push app
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push pusher
        uses: docker/build-push-action@v7
        with:
          context: ./pusher
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-pusher.outputs.tags }}
          labels: ${{ steps.meta-pusher.outputs.labels }}
          cache-from: type=gha,scope=pusher
          cache-to: type=gha,mode=max,scope=pusher
