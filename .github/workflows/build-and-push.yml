name: Build & Push Docker Images

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push app
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }}
          labels: |
            org.opencontainers.image.title=gleaned
            org.opencontainers.image.description=Personal offline-first learning journal
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push pusher
        uses: docker/build-push-action@v7
        with:
          context: ./pusher
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-pusher:latest
            ghcr.io/${{ github.repository }}-pusher:${{ github.event.workflow_run.head_sha }}
          labels: |
            org.opencontainers.image.title=gleaned-pusher
            org.opencontainers.image.description=Push notification server for gleaned
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=pusher
          cache-to: type=gha,mode=max,scope=pusher
