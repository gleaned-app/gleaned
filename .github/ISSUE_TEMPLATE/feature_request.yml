name: Feature Request
description: Propose an improvement or new capability
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please read the [scope section in CONTRIBUTING.md](../blob/main/CONTRIBUTING.md#whats-out-of-scope).
        Features that conflict with gleaned's design principles (E2E encryption, self-hosted, no accounts) will be closed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you run into this limitation. Focus on the problem, not the solution.
      placeholder: "When I … I can't … which means I have to …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as you can.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which part of the app does this affect?
      options:
        - Journal (writing / editing entries)
        - Calendar (heatmap / day view)
        - Learning list (todos)
        - Review (spaced repetition)
        - Search
        - Settings / theming
        - Push notifications
        - PWA / install
        - Performance
        - Accessibility
        - i18n / language support
        - Developer experience
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Are there workarounds you're using today? Other tools that do this well?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, screenshots, links to prior art — anything that helps paint the picture.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this hasn't been requested yet
          required: true
        - label: This fits the scope of gleaned (E2E encrypted personal journal, no accounts, self-hosted)
          required: true
