services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      couchdb:
        condition: service_healthy
      pusher:
        condition: service_healthy

  pusher:
    build: ./pusher
    restart: unless-stopped
    environment:
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@gleaned.local}
      COUCHDB_URL: http://${COUCHDB_USER:-admin}:${COUCHDB_PASSWORD:-changeme}@couchdb:5984
      PUSH_HOUR: ${PUSH_HOUR:-20}
      PUSH_MINUTE: ${PUSH_MINUTE:-0}
      DUE_HOUR: ${DUE_HOUR:-9}
      DUE_MINUTE: ${DUE_MINUTE:-0}
    depends_on:
      couchdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  couchdb:
    image: couchdb:3
    restart: unless-stopped
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-changeme}
    volumes:
      - couchdb_data:/opt/couchdb/data
      - ./couchdb/local.ini:/opt/couchdb/etc/local.d/local.ini:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5984/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  couchdb_data:
