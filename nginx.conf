server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # script-src needs 'unsafe-inline' because Next.js static export injects
    # inline scripts (chunk loader, flash-prevention init). style-src needs
    # 'unsafe-inline' because React renders inline style= attributes (OKLCH
    # vars, dynamic layout values). connect-src 'self' covers /db/ and /push/
    # nginx proxies; users who configure a direct external CouchDB URL will
    # need to extend this in their own nginx config.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; connect-src 'self'; font-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Push notification API — proxied to the pusher container (optional service).
    # Variable-based proxy_pass defers DNS resolution to request time so nginx
    # starts cleanly even when the pusher container is not running.
    resolver 127.0.0.11 valid=10s ipv6=off;
    location /push/ {
        set $pusher http://pusher:3001;
        proxy_pass $pusher/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # CouchDB sync — proxied so port 5984 stays internal to Docker
    # Use http://your-host/db/gleaned as sync URL (credentials via Settings UI)
    location /db/ {
        set $couchdb http://couchdb:5984;
        proxy_pass $couchdb/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Required for CouchDB changes feed (long-polling / streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 65s;
    }

    # Service Worker: never cache, allow root scope
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Theme/font init script: never cache — must stay fresh like sw.js
    location = /init.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Manifest: revalidate on every load
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # Next.js hashed chunks: cache forever (content-addressed)
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Icons and other static assets
    location ~* \.(png|svg|ico|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000";
    }

    # Everything else: try file, fallback to index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
