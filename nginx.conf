server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Push notification API — proxied to the pusher container
    location /push/ {
        proxy_pass http://pusher:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # Service Worker: never cache, allow root scope
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Manifest: revalidate on every load
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # Next.js hashed chunks: cache forever (content-addressed)
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Icons and other static assets
    location ~* \.(png|svg|ico|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000";
    }

    # Everything else: try file, fallback to index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
