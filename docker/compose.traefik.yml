# Production deployment with Traefik reverse proxy.
#
# Prerequisites on the VPS:
#   - Traefik running with an external Docker network
#   - A cert resolver configured in Traefik
#   - A .env file (see .env.example)
#
# Usage:
#   docker compose -f docker/compose.traefik.yml pull
#   docker compose -f docker/compose.traefik.yml up -d

# Pin the Compose project name so the stack is identified the same way no
# matter which directory `docker compose` is invoked from. Without this,
# Compose derives the project name from the parent directory, so running
# `up` from /srv/gleaned/ vs /srv/gleaned/docker/ creates two parallel
# stacks (project=gleaned and project=docker) — both registered with
# Traefik under the same Host() rule, which load-balances 50/50 between
# old and new app containers and yields chunk-404 chaos after deploys.
name: gleaned

services:
  app:
    image: ${GLEANED_IMAGE:-ghcr.io/gleaned-app/gleaned:latest}
    restart: unless-stopped
    environment:
      DB_PATH:           /data/gleaned.db
      # Traefik is always in front — trust the X-Forwarded-For header it injects.
      TRUST_PROXY:       "true"
      VAPID_PUBLIC_KEY:  ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT:     ${VAPID_SUBJECT:-mailto:admin@${DOMAIN}}
      SEND_SECRET:       ${SEND_SECRET:-}
      PUSH_HOUR:         ${PUSH_HOUR:-20}
      PUSH_MINUTE:       ${PUSH_MINUTE:-0}
      DUE_HOUR:          ${DUE_HOUR:-9}
      DUE_MINUTE:        ${DUE_MINUTE:-0}
      PUSH_TZ:           ${PUSH_TZ:-UTC}
    volumes:
      - gleaned_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-frontend}"
      # Main domain
      - "traefik.http.routers.gleaned.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.gleaned.entrypoints=websecure"
      - "traefik.http.routers.gleaned.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.gleaned.loadbalancer.server.port=3000"
      # www → non-www redirect
      - "traefik.http.routers.gleaned-www.rule=Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.gleaned-www.entrypoints=websecure"
      - "traefik.http.routers.gleaned-www.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.gleaned-www.middlewares=gleaned-redirect-www"
      - "traefik.http.middlewares.gleaned-redirect-www.redirectregex.regex=^https://www\\.${DOMAIN}/(.*)"
      - "traefik.http.middlewares.gleaned-redirect-www.redirectregex.replacement=https://${DOMAIN}/$${1}"
      - "traefik.http.middlewares.gleaned-redirect-www.redirectregex.permanent=true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Backup sidecar: runs nightly, safe under concurrent writes.
  # Uncomment and adjust BACKUP_DIR to enable automated SQLite backups.
  #
  # backup:
  #   image: keinos/sqlite3:latest
  #   restart: unless-stopped
  #   volumes:
  #     - gleaned_data:/data:ro
  #     - /path/to/backups:/backups
  #   entrypoint: ["sh", "-c"]
  #   command:
  #     - 'while true; do sqlite3 /data/gleaned.db "VACUUM INTO /backups/gleaned-$(date +%Y%m%d).db"; sleep 86400; done'

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-frontend}

volumes:
  gleaned_data:
