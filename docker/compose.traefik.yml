# Production deployment with Traefik reverse proxy.
#
# Prerequisites on the VPS:
#   - Traefik running with an external Docker network
#   - A cert resolver configured in Traefik
#   - A .env file (see .env.example)
#
# Usage:
#   docker compose -f docker/compose.traefik.yml pull
#   docker compose -f docker/compose.traefik.yml up -d
#
# CouchDB is NOT exposed to the internet — nginx inside the app container
# proxies /db/ to CouchDB internally. Sync URL: https://${DOMAIN}/db/gleaned

services:
  app:
    image: ghcr.io/gleaned-app/gleaned:latest
    restart: unless-stopped
    depends_on:
      couchdb:
        condition: service_healthy
      pusher:
        condition: service_healthy
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      GLEANED_SYNC_URL: https://${DOMAIN}/db/gleaned
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
    networks:
      - traefik
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-frontend}"
      # Main domain
      - "traefik.http.routers.gleaned.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.gleaned.entrypoints=websecure"
      - "traefik.http.routers.gleaned.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.gleaned.loadbalancer.server.port=80"
      # www → non-www redirect
      - "traefik.http.routers.gleaned-www.rule=Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.gleaned-www.entrypoints=websecure"
      - "traefik.http.routers.gleaned-www.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.gleaned-www.middlewares=gleaned-redirect-www"
      - "traefik.http.middlewares.gleaned-redirect-www.redirectregex.regex=^https://www\\.${DOMAIN}/(.*)"
      - "traefik.http.middlewares.gleaned-redirect-www.redirectregex.replacement=https://${DOMAIN}/$${1}"
      - "traefik.http.middlewares.gleaned-redirect-www.redirectregex.permanent=true"

  pusher:
    image: ghcr.io/gleaned-app/gleaned-pusher:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@${DOMAIN}}
      COUCHDB_URL: http://${COUCHDB_USER:-admin}:${COUCHDB_PASSWORD:-changeme}@couchdb:5984
      PUSH_HOUR: ${PUSH_HOUR:-20}
      PUSH_MINUTE: ${PUSH_MINUTE:-0}
      DUE_HOUR: ${DUE_HOUR:-9}
      DUE_MINUTE: ${DUE_MINUTE:-0}
    depends_on:
      couchdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  couchdb:
    image: couchdb:3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-changeme}
    volumes:
      - couchdb_data:/opt/couchdb/data
      - ./docker/couchdb/local.ini:/opt/couchdb/etc/local.d/local.ini:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5984/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - internal

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-frontend}
  internal:
    internal: true

volumes:
  couchdb_data:
