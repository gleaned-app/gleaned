[httpd]
enable_cors = true
bind_address = 0.0.0.0

[cors]
; Wildcard is safe: CouchDB port 5984 is never exposed externally,
; all external traffic goes through the nginx proxy (/db/ location).
; nginx strips the Origin header before proxying so this setting only
; matters for direct LAN/localhost access during development.
origins = *
credentials = true
methods = GET, PUT, POST, HEAD, DELETE
headers = accept, authorization, content-type, origin, referer
